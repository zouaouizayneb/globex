<section class="testimonial-section">

  <!-- Left panel -->
  <div class="left-panel">
    <div class="left-top">
      <span class="eyebrow">Verified Reviews</span>
      <h2 class="heading">Loved by<br><em>thousands</em><br>of shoppers.</h2>

      <div class="stat-row">
        <div class="stat">
          <span class="stat-number">4.9</span>
          <span class="stat-label">Average Rating</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <span class="stat-number">2k+</span>
          <span class="stat-label">Happy Clients</span>
        </div>
      </div>
    </div>

    <!-- Dot navigation -->
    <div class="dot-nav">
      <button
        *ngFor="let t of testimonials; let i = index"
        class="dot"
        [class.active]="i === activeIndex"
        (click)="goTo(i)"
        [attr.aria-label]="'Go to review ' + (i + 1)"
      ></button>
      <span class="counter">{{ activeIndex + 1 }}&nbsp;/&nbsp;{{ testimonials.length }}</span>
    </div>
  </div>

  <!-- Right panel: carousel -->
  <div class="right-panel">
    <div class="testimonial-track">
      <div
        *ngFor="let t of testimonials; let i = index"
        class="testimonial-slide"
        [class.visible]="i === activeIndex"
        [class.exit]="i === exitIndex"
      >
        <!-- Category badge -->
        <div class="category-badge">
          <span class="category-icon">{{ t.categoryIcon }}</span>
          <span class="category-label">{{ t.category }}</span>
        </div>

        <!-- Stars -->
        <div class="star-row">
          <span *ngFor="let s of getStars(t.rating)"     class="star filled">★</span>
          <span *ngFor="let s of getEmptyStars(t.rating)" class="star empty">★</span>
        </div>

        <!-- Quote -->
        <p class="quote-text">"{{ t.text }}"</p>

        <!-- Author -->
        <div class="author-row">
          <div class="monogram">{{ t.initials }}</div>
          <div class="author-info">
            <span class="author-name">{{ t.name }}</span>
            <span class="author-meta">Verified Purchase &middot; {{ t.date }}</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Progress bar -->
    <div class="progress-bar">
      <div
        class="progress-fill"
        [style.animation-duration]="intervalMs + 'ms'"
        [class.running]="isRunning"
      ></div>
    </div>
  </div>

</section>
