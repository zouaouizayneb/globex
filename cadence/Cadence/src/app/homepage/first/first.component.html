<section class="hero">

  <div class="hero-video-wrap">
    <video #heroVideo autoplay muted loop playsinline class="hero-video">
      <source [src]="videoUrl" type="video/mp4">
    </video>
    <div class="overlay-dark"></div>
    <div class="overlay-green"></div>
    <div class="overlay-vignette"></div>
  </div>

  <div class="category-pills" [class.visible]="loaded">
    <span *ngFor="let cat of categories; let i = index"
          class="pill"
          [style.animation-delay]="(0.8 + i * 0.12) + 's'">
      {{ cat.icon }}&nbsp; {{ cat.label }}
    </span>
  </div>

  <div class="hero-body" [class.visible]="loaded">
    <p class="hero-eyebrow">Global Marketplace</p>

    <h1 class="hero-title">
      Trade Without<br>
      <em class="hero-title-accent">Borders.</em>
    </h1>

    <p class="hero-sub">
      Your passport to the world's best products —<br class="br-desk">
      home, fashion, sports &amp; beyond.
    </p>

    <div class="hero-actions">
      <a [routerLink]="['/collections']" class="btn-primary">
        <span>Shop Now</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </a>
      <a [routerLink]="['/collections']" class="btn-ghost">Explore Categories</a>
    </div>
  </div>

  <div class="hero-footer" [class.visible]="loaded">
    <div class="scroll-hint">
      <span class="scroll-line"></span>
      <span class="scroll-label">Scroll</span>
    </div>
    <div class="stat-strip">
      <div class="stat" *ngFor="let s of stats">
        <strong>{{ s.value }}</strong>
        <span>{{ s.label }}</span>
      </div>
    </div>
  </div>

</section>
