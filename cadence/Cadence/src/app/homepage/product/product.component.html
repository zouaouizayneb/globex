<h1 class="title">Explore Our Collection</h1>

<!-- DEBUG: Show raw API response -->
<div *ngIf="debugInfo" style="background: #ffeb3b; padding: 10px; margin: 10px; font-family: monospace; font-size: 12px; white-space: pre-wrap; max-height: 200px; overflow: auto;">
  <strong>DEBUG API Response:</strong>
  {{debugInfo}}
</div>

<div class="loading-state" *ngIf="loading">
  <p>Loading products...</p>
</div>

<div class="error-state" *ngIf="error && !loading">
  <p>{{ error }}</p>
  <button class="btn" (click)="retry()">Retry</button>
</div>

<div class="product-grid" *ngIf="!loading && !error">
  <div class="product-card" *ngFor="let product of products">

    <div class="product-actions">
      <button class="icon-btn" (click)="addToCart(product)" [class.active]="isInCart(product)">

        </svg>
      </button>
      <button class="icon-btn wishlist-btn" (click)="addToWishlist(product)" [class.active]="isInWishlist(product)">
        <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 17 17" fill="none">
          <path d="M8.51699 16.3418C8.23366 16.4418 7.76699 16.4418 7.48366 16.3418C5.06699 15.5168 0.666992 12.0752 0.666992 6.24183C0.666992 3.66683 2.74199 1.5835 5.30032 1.5835C6.81699 1.5835 8.15866 2.31683 9.00032 3.45016C9.84199 2.31683 11.192 1.5835 12.7003 1.5835C15.2587 1.5835 17.3337 3.66683 17.3337 6.24183C17.3337 12.0752 11.9337 15.5168 9.51699 16.3418Z" stroke="#111111" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <div class="badge new" *ngIf="product.isNew">New</div>
    <div class="badge discount" *ngIf="product.discount">-{{product.discount}}%</div>

    <img
      class="standard-product-image"
      loading="lazy"
      [src]="product.image"
      [alt]="product.name"
      (error)="onImageError($event)"
    >

    <p class="name">{{product.name}}</p>
    <div class="stars">{{getStars(product.rating)}}</div>

    <div class="price">
      <span class="current">{{formatPrice(product.price)}}</span>
      <span class="old" *ngIf="product.oldPrice">{{formatOldPrice(product.oldPrice)}}</span>
    </div>

    <div class="colors" *ngIf="product.colors && product.colors.length">
      <span *ngFor="let color of product.colors" [style.background]="color"></span>
    </div>

  </div>
</div>
