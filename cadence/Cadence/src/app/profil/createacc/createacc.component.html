<section class="common-banner-sec" style="background-image:url(https://i.imgur.com/WzPjkDY.png);">
    <div class="container">
        <div class="common-banner-content text-center">
           
             <div class="section-title">
               <div class="subtitle">Ctrate Account</div>
            </div>
          
          <div class="breadcrumbs">
             <ul class="filter-cat flex align-center justify-center">
                <p> Home > Create Account</p>
            </ul>
          </div>
        </div>
    </div>
  </section>

  <div class="create-account-container">
    <div class="create-account-content">
      <h1>Create Account</h1>
      <p class="subtitle">Please Register using account detail below.</p>
      
      <form class="create-account-form" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="firstName">First Name <span class="required">*</span></label>
          <input 
            type="text" 
            id="firstName" 
            [(ngModel)]="formData.firstName" 
            name="firstName"
            placeholder="First name"
            required>
        </div>
  
        <div class="form-group">
          <label for="lastName">Last Name <span class="required">*</span></label>
          <input 
            type="text" 
            id="lastName" 
            [(ngModel)]="formData.lastName" 
            name="lastName"
            placeholder="Last name"
            required>
        </div>
  
        <div class="form-group">
          <label for="email">Email Address <span class="required">*</span></label>
          <input 
            type="email" 
            id="email" 
            [(ngModel)]="formData.email" 
            name="email"
            placeholder="Email"
            required>
        </div>
  
        <div class="form-group">
          <label for="password">Actual Password <span class="required">*</span></label>
          <input 
            type="password" 
            id="password" 
            [(ngModel)]="formData.password" 
            name="password"
            placeholder="Password"
            required>
        </div>
  
        <button class="create-btn"  [routerLink]="['/account']">
          CREATE
          <span class="arrow">→</span>
        </button>
      </form>
    </div>
  </div>
